{% extends "base.html" %}
{% block title %}创建歌单 — 乐享{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card p-4">
            <h3 class="text-light mb-4">
                <i class="fas fa-plus-circle" style="color: var(--primary);"></i> 创建新歌单
            </h3>

            <form method="POST" action="{{ url_for('playlist.create') }}">
                <div class="mb-3">
                    <label for="name" class="form-label">歌单名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="name" name="name"
                           placeholder="给我的歌单起个名字" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">歌单描述</label>
                    <textarea class="form-control" id="description" name="description" rows="3"
                              placeholder="描述一下这个歌单...（选填）"></textarea>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="is_public" name="is_public" checked>
                    <label class="form-check-label text-muted" for="is_public">
                        公开歌单（其他人也可以看到）
                    </label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check"></i> 创建歌单
                    </button>
                    <a href="{{ url_for('playlist.my_playlists') }}" class="btn btn-outline-light">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
