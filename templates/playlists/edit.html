{% extends "base.html" %}
{% block title %}编辑歌单 — {{ playlist.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card p-4">
            <h3 class="text-light mb-4">
                <i class="fas fa-edit" style="color: var(--primary);"></i> 编辑歌单
            </h3>

            <form method="POST" action="{{ url_for('playlist.edit', playlist_id=playlist.id) }}">
                <div class="mb-3">
                    <label for="name" class="form-label">歌单名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="name" name="name"
                           value="{{ playlist.name }}" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">歌单描述</label>
                    <textarea class="form-control" id="description" name="description" rows="3">{{ playlist.description }}</textarea>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="is_public" name="is_public"
                           {% if playlist.is_public %}checked{% endif %}>
                    <label class="form-check-label text-muted" for="is_public">公开歌单</label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存修改
                    </button>
                    <a href="{{ url_for('playlist.detail', playlist_id=playlist.id) }}" class="btn btn-outline-light">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
