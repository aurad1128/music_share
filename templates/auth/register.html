{% extends "base.html" %}
{% block title %}注册 — 乐享{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4">
            <h3 class="text-center mb-4">
                <i class="fas fa-user-plus" style="color: var(--primary);"></i> 创建账号
            </h3>

            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="username" name="username"
                           value="{{ username|default('') }}"
                           placeholder="2-80个字符" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">邮箱 <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" name="email"
                           value="{{ email|default('') }}"
                           placeholder="请输入有效邮箱" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="至少6位密码" required>
                    <small class="text-muted">密码长度不能少于 6 位</small>
                </div>

                <div class="mb-3">
                    <label for="password2" class="form-label">确认密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="password2" name="password2"
                           placeholder="再次输入密码" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </form>

            <hr style="border-color: rgba(108,92,231,0.2);">

            <div class="text-center">
                <span class="text-muted">已有账号？</span>
                <a href="{{ url_for('auth.login') }}" style="color: var(--primary); text-decoration: none;">
                    立即登录
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
