{% extends "base.html" %}
{% block title %}登录 — 乐享{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4">
            <h3 class="text-center mb-4">
                <i class="fas fa-sign-in-alt" style="color: var(--primary);"></i> 用户登录
            </h3>

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background: rgba(22,33,62,0.6); border-color: rgba(108,92,231,0.3); color: #808090;">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" class="form-control" id="username" name="username"
                               value="{{ username|default('') }}"
                               placeholder="请输入用户名" required autofocus>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background: rgba(22,33,62,0.6); border-color: rgba(108,92,231,0.3); color: #808090;">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="请输入密码" required>
                    </div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label text-muted" for="remember">记住我</label>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>

            <hr style="border-color: rgba(108,92,231,0.2);">

            <div class="text-center">
                <span class="text-muted">还没有账号？</span>
                <a href="{{ url_for('auth.register') }}" style="color: var(--primary); text-decoration: none;">
                    立即注册
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
