{% extends "base.html" %}
{% block title %}上传音乐 — 乐享{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card p-4">
            <h3 class="text-light mb-4">
                <i class="fas fa-upload" style="color: var(--primary);"></i> 上传音乐作品
            </h3>

            <form method="POST" action="{{ url_for('song.upload') }}" enctype="multipart/form-data">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="title" class="form-label">歌曲名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title"
                               value="{{ title|default('') }}" placeholder="输入歌曲名称" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="artist" class="form-label">歌手名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="artist" name="artist"
                               value="{{ artist|default('') }}" placeholder="输入歌手名" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="album" class="form-label">专辑名称</label>
                    <input type="text" class="form-control" id="album" name="album"
                           value="{{ album|default('') }}" placeholder="输入专辑名（选填）">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="style" class="form-label">音乐风格 <span class="text-danger">*</span></label>
                        <select class="form-select" id="style" name="style" required>
                            <option value="" disabled>选择风格</option>
                            {% for style in styles %}
                            <option value="{{ style }}" {% if style == style|default('流行') %}selected{% endif %}>
                                {{ style }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="cover_image" class="form-label">专辑封面图</label>
                        <input type="file" class="form-control" id="cover_image" name="cover_image"
                               accept="image/png, image/jpeg, image/gif, image/webp"
                               onchange="previewCover(this)">
                    </div>
                </div>

                <!-- 封面预览 -->
                <div class="mb-3 text-center" id="cover-preview-container" style="display: none;">
                    <img id="cover-preview" src="#" alt="封面预览"
                         style="max-width: 200px; max-height: 200px; border-radius: 8px; object-fit: cover;">
                </div>

                <div class="mb-3">
                    <label for="audio_url" class="form-label">
                        音频/视频链接 <span class="text-muted">（网易云/QQ音乐/B站等嵌入链接）</span>
                    </label>
                    <input type="url" class="form-control" id="audio_url" name="audio_url"
                           value="{{ audio_url|default('') }}"
                           placeholder="例如：https://music.163.com/outchain/player?...">
                    <small class="text-muted">
                        <i class="fas fa-info-circle"></i> 支持网易云音乐、QQ音乐、B站等平台的分享嵌入链接。
                        将分享链接中的 src 地址粘贴到此处即可。
                    </small>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">歌曲简介</label>
                    <textarea class="form-control" id="description" name="description" rows="3"
                              placeholder="分享一下这首歌的故事...（选填）">{{ description|default('') }}</textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-upload"></i> 上传音乐
                    </button>
                    <a href="{{ url_for('main.index') }}" class="btn btn-outline-light">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 封面预览功能
function previewCover(input) {
    const container = document.getElementById('cover-preview-container');
    const preview = document.getElementById('cover-preview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) {
            preview.src = e.target.result;
            container.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    } else {
        container.style.display = 'none';
    }
}
</script>
{% endblock %}
